name: Deploy to Cloud Run

on:
  push:
    branches:
      - master
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy bni47-api \
          --source backend \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --set-env-vars SECRET_KEY=${{ secrets.SECRET_KEY }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},GOOGLE_REFRESH_TOKEN=${{ secrets.GOOGLE_REFRESH_TOKEN }},SMTP_EMAIL=${{ secrets.SMTP_EMAIL }},SMTP_APP_PASSWORD=${{ secrets.SMTP_APP_PASSWORD }},FRONTEND_URL=${{ secrets.FRONTEND_URL }}
